<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لعبة الحروف</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#fff0f9;
  font-family:'Baloo 2',cursive;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
#app{
  width:100%;
  max-width:400px;
}

/* WELCOME */
.welcome{text-align:center;}
.crown{font-size:4rem;display:block;animation:bob 1s ease-in-out infinite alternate;}
@keyframes bob{from{transform:translateY(0)}to{transform:translateY(-12px)}}
.card{
  background:#fff;
  border:3px solid #ffd6ec;
  border-radius:24px;
  padding:20px;
  margin:14px 0;
  box-shadow:0 6px 0 #ffd6ec,0 12px 30px rgba(255,110,180,0.15);
}
.name{font-family:'Fredoka One',cursive;font-size:1.25rem;color:#ff6eb4;margin-bottom:8px;line-height:1.4;}
.klass{
  display:inline-block;background:#ffd6ec;color:#c77dff;
  font-weight:800;padding:3px 16px;border-radius:20px;font-size:0.95rem;margin-bottom:8px;
}
.teacher{font-size:0.88rem;font-weight:700;color:#a06080;}
.stars{font-size:1.6rem;letter-spacing:4px;margin:10px 0 18px;}

/* BIG BUTTON - using <a> tag for Safari */
a.bigbtn{
  display:block;
  background:linear-gradient(135deg,#ff6eb4,#c77dff);
  color:#fff;
  font-family:'Fredoka One',cursive;
  font-size:1.5rem;
  text-align:center;
  text-decoration:none;
  padding:18px;
  border-radius:50px;
  box-shadow:0 7px 0 #b03090,0 12px 25px rgba(255,110,180,0.4);
  cursor:pointer;
  -webkit-user-select:none;
  user-select:none;
}
a.bigbtn:active{transform:translateY(4px);box-shadow:0 3px 0 #b03090;}

/* QUIZ */
.quiz{display:none;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.qnum{font-weight:800;color:#c77dff;font-size:1rem;}
.hh{font-size:1rem;letter-spacing:2px;}
.ptrack{background:#ffd6ec;border-radius:20px;height:12px;margin-bottom:16px;overflow:hidden;}
.pfill{height:100%;background:linear-gradient(90deg,#ff6eb4,#c77dff);border-radius:20px;transition:width 0.4s;}

.qcard{
  background:#fff;border:3px solid #ffd6ec;border-radius:26px;
  padding:22px 18px;
  box-shadow:0 6px 0 #ffd6ec,0 16px 40px rgba(255,110,180,0.15);
  position:relative;
}
.rib{
  position:absolute;top:-12px;left:50%;transform:translateX(-50%);
  background:linear-gradient(135deg,#ff6eb4,#c77dff);
  color:#fff;font-family:'Fredoka One',cursive;font-size:0.82rem;
  padding:4px 18px;border-radius:20px;white-space:nowrap;
}
.imgbox{
  width:100%;aspect-ratio:1;max-height:180px;
  background:#ffd6ec;border-radius:18px;
  display:flex;align-items:center;justify-content:center;
  font-size:6rem;margin-bottom:16px;
  border:2px solid rgba(255,110,180,0.2);
}
.wordrow{
  text-align:center;margin-bottom:14px;
  font-family:'Fredoka One',cursive;font-size:2.2rem;
  color:#5c2d6e;letter-spacing:3px;
  display:flex;align-items:center;justify-content:center;gap:3px;flex-wrap:wrap;
}
.blank{
  display:inline-flex;align-items:center;justify-content:center;
  width:34px;height:40px;
  background:#ffd6ec;border:3px dashed #ff6eb4;border-radius:8px;
  font-size:1.4rem;
  animation:bl 1.3s infinite alternate;
}
@keyframes bl{
  from{border-color:#ff6eb4;background:#ffd6ec}
  to{border-color:#c77dff;background:#e0aaff;opacity:0.7}
}
.hint{text-align:center;color:#c77dff;font-size:0.88rem;font-weight:700;margin-bottom:14px;}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* CHOICE as <a> tag */
a.choice{
  display:flex;
  align-items:center;
  justify-content:center;
  height:85px;
  background:linear-gradient(160deg,#fff5fb,#ffe8f5);
  border:3px solid #ffd6ec;
  border-radius:18px;
  font-family:'Fredoka One',cursive;
  font-size:1.9rem;
  color:#5c2d6e;
  letter-spacing:3px;
  text-decoration:none;
  box-shadow:0 5px 0 #ffd6ec;
  cursor:pointer;
  -webkit-user-select:none;
  user-select:none;
  transition:transform 0.1s;
}
a.choice:active{transform:scale(0.93);box-shadow:0 2px 0 #ffd6ec;}
a.choice.correct{
  background:linear-gradient(160deg,#d4ffed,#a8f5d0)!important;
  border-color:#4caf50!important;color:#1b5e20;
}
a.choice.wrong{
  background:linear-gradient(160deg,#ffe0e0,#ffb3b3)!important;
  border-color:#ef5350!important;color:#7f1d1d;
}

/* RESULT */
.result{display:none;text-align:center;}
.rbig{font-size:4.5rem;display:block;margin-bottom:8px;}
.rtitle{font-family:'Fredoka One',cursive;font-size:2rem;color:#ff6eb4;text-shadow:2px 2px 0 #e0aaff;}
.scircle{
  width:130px;height:130px;border-radius:50%;
  background:linear-gradient(135deg,#ff6eb4,#c77dff);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:0 0 0 8px #ffd6ec,0 10px 35px rgba(255,110,180,0.4);
  margin:18px auto;
}
.snum{font-family:'Fredoka One',cursive;font-size:3rem;color:#fff;line-height:1;}
.sof{color:rgba(255,255,255,0.8);font-size:0.85rem;font-weight:700;}
.rstars{font-size:2.2rem;letter-spacing:4px;margin:6px 0;}
.rmsg{font-size:1rem;color:#c77dff;font-weight:700;margin:6px 0 22px;}
</style>
</head>
<body>
<div id="app">

<!-- WELCOME -->
<div class="welcome" id="pg-welcome">
  <span class="crown">👑</span>
  <div class="card">
    <div class="name">هتون عبدالله عطيه الشيخي الزهراني</div>
    <div class="klass">الصف 3/2</div><br>
    <div class="teacher">بإشراف المعلمة: أحلام البشري</div>
  </div>
  <div class="stars">⭐⭐⭐⭐</div>
  <a class="bigbtn" href="javascript:void(0)" onclick="startGame()">إبدأي اللعب! 🎀</a>
</div>

<!-- QUIZ -->
<div class="quiz" id="pg-quiz">
  <div class="topbar">
    <span class="qnum" id="qnum">سؤال 1 من 4</span>
    <span class="hh" id="hh">🤍🤍🤍🤍</span>
  </div>
  <div class="ptrack"><div class="pfill" id="pfill" style="width:0%"></div></div>
  <div class="qcard">
    <div class="rib">🌸 أكملي الكلمة!</div>
    <div class="imgbox" id="imgbox">🍕</div>
    <div class="wordrow" id="wordrow" dir="ltr"></div>
    <div class="hint">اختاري الحروف الناقصة 👇</div>
    <div class="choices" id="choices"></div>
  </div>
</div>

<!-- RESULT -->
<div class="result" id="pg-result">
  <span class="rbig" id="remoji">🏆</span>
  <div class="rtitle" id="rtitle">رائعة!</div>
  <div class="scircle">
    <div class="snum" id="snum">4</div>
    <div class="sof">من 4 ✨</div>
  </div>
  <div class="rstars" id="rstars">⭐⭐⭐⭐</div>
  <div class="rmsg" id="rmsg">أنتِ نجمة! 🌸</div>
  <a class="bigbtn" href="javascript:void(0)" onclick="restartGame()">🔄 العب مرة ثانية!</a>
</div>

</div><!-- /app -->

<script>
var QS=[
  {img:'🍕',shown:'pizz',blanks:3,c:['zza','iza'],ans:'zza'},
  {img:'🥤',shown:'cu',  blanks:1,c:['p','b'],    ans:'p'},
  {img:'🌾',shown:'flo', blanks:2,c:['ur','yr'],  ans:'ur'},
  {img:'🍅',shown:'tomat',blanks:2,c:['es','rs'], ans:'es'}
];
var qi=0,sc=0,busy=false;

function $(id){return document.getElementById(id);}

function page(name){
  $('pg-welcome').style.display='none';
  $('pg-quiz').style.display='none';
  $('pg-result').style.display='none';
  if(name==='quiz') $('pg-quiz').style.display='block';
  else if(name==='result') $('pg-result').style.display='block';
  else $('pg-welcome').style.display='block';
}

/* Sound */
var AC=null;
function getAC(){
  if(!AC) AC=new(window.AudioContext||window.webkitAudioContext)();
  if(AC.state==='suspended') AC.resume();
  return AC;
}
function playTone(freq,type,delay,dur,vol){
  var c=getAC();
  var o=c.createOscillator(),g=c.createGain();
  o.connect(g);g.connect(c.destination);
  o.type=type; o.frequency.value=freq;
  var t=c.currentTime+delay;
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol,t+0.04);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.start(t); o.stop(t+dur);
}
function sound(ok){
  try{
    if(ok){
      playTone(523,'sine',0,0.3,0.3);
      playTone(659,'sine',0.12,0.3,0.3);
      playTone(784,'sine',0.24,0.3,0.3);
      playTone(1047,'sine',0.36,0.4,0.3);
    } else {
      playTone(330,'sawtooth',0,0.25,0.25);
      playTone(277,'sawtooth',0.15,0.25,0.25);
      playTone(220,'sawtooth',0.3,0.3,0.2);
    }
  }catch(e){}
}

function loadQ(){
  busy=false;
  var q=QS[qi];
  $('qnum').textContent='سؤال '+(qi+1)+' من 4';
  $('pfill').style.width=Math.round((qi/4)*100)+'%';
  var h='';for(var i=0;i<4;i++)h+=i<sc?'💛':'🤍';
  $('hh').textContent=h;
  $('imgbox').textContent=q.img;

  /* word */
  var wr=$('wordrow');
  wr.innerHTML='<span>'+q.shown+'</span>';
  for(var j=0;j<q.blanks;j++){
    wr.innerHTML+='<span class="blank" id="bl'+j+'"></span>';
  }

  /* choices */
  var ch=$('choices');
  ch.innerHTML='';
  for(var k=0;k<q.c.length;k++){
    ch.innerHTML+='<a class="choice" href="javascript:void(0)" onclick="pick(this,\''+q.c[k]+'\')">'+q.c[k]+'</a>';
  }
}

function pick(el,choice){
  if(busy)return;
  busy=true;

  var q=QS[qi];
  var all=document.querySelectorAll('.choice');
  for(var i=0;i<all.length;i++) all[i].setAttribute('onclick','');

  if(choice===q.ans){
    el.className='choice correct';
    sc++;
    sound(true);
    var letters=q.ans.split('');
    for(var j=0;j<letters.length;j++){
      var b=$('bl'+j);
      if(b){b.textContent=letters[j];b.style.animation='none';b.style.background='#a8f5d0';b.style.borderColor='#4caf50';b.style.borderStyle='solid';}
    }
    setTimeout(next,1300);
  } else {
    el.className='choice wrong';
    for(var x=0;x<all.length;x++){if(all[x].textContent===q.ans)all[x].className='choice correct';}
    sound(false);
    setTimeout(next,1400);
  }
}

function next(){
  qi++;
  if(qi<QS.length){loadQ();}
  else{showRes();}
}

function showRes(){
  page('result');
  $('snum').textContent=sc;
  var e,t,m,s;
  if(sc===4){e='🏆';t='مثالية تماماً!';m='كل الإجابات صحيحة! أنتِ عبقرية 🌟';s='⭐⭐⭐⭐';}
  else if(sc===3){e='🌸';t='ممتازة جداً!';m='أحسنتِ! تقريباً كاملة 💖';s='⭐⭐⭐✨';}
  else if(sc===2){e='🤩';t='جيد جداً!';m='استمري بالتدريب 💪';s='⭐⭐✨✨';}
  else{e='🌈';t='حاولي مجدداً!';m='لا بأس! المحاولة تصنع الفارق 🌸';s='⭐✨✨✨';}
  $('remoji').textContent=e;
  $('rtitle').textContent=t;
  $('rmsg').textContent=m;
  $('rstars').textContent=s;
}

function startGame(){
  try{
    AC=new(window.AudioContext||window.webkitAudioContext)();
    AC.resume();
    // Play a silent buffer to unlock audio on iOS
    var buf=AC.createBuffer(1,1,22050);
    var src=AC.createBufferSource();
    src.buffer=buf;
    src.connect(AC.destination);
    src.start(0);
  }catch(e){}
  qi=0;sc=0;
  page('quiz');
  loadQ();
}

function restartGame(){
  qi=0;sc=0;
  page('quiz');
  loadQ();
}

/* init */
page('welcome');
</script>
</body>
</html>
